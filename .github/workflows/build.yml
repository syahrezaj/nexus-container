name: Build and Publish Docker Image

on:
  push:
    branches: ["main"] # Fires every time you push code to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Necessary to give the bot permission to upload the image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub generates this automatically for the build

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This tags the image with your repo name and 'latest'
          tags: ghcr.io/${{ github.repository }}:latest
